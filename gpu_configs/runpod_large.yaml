# GPU config for large models (70B+ parameters, ~80GB+ VRAM)
backend: local

artifacts:
  root_dir: /runpod-volume/sgtr-rl/results

local:
  device: cuda
  dtype: bfloat16
  max_seq_length: 4096
  eval_batch_size: 2
  gradient_checkpointing: true
  load_in_4bit: false
  attention_implementation: sdpa
  cache_dir: /runpod-volume/sgtr-rl/hf-cache
  lora_dropout: 0.0
  target_modules: all-linear

runpod:
  image_name: runpod/pytorch:2.8.0-py3.11-cuda12.8.1-cudnn-devel-ubuntu22.04
  gpu_type_ids:
    - NVIDIA A100 80GB PCIe
    - NVIDIA A100-SXM4-80GB
    - NVIDIA H100 80GB HBM3
    - NVIDIA H100 PCIe
    - NVIDIA H100 NVL
    - NVIDIA H200
  gpu_count: 1
  cloud_type: SECURE
  container_disk_gb: 100
  volume_mount_path: /runpod-volume
  network_volume_id: none  # disabled — results uploaded to HF instead
  repo_url: https://github.com/jesse-st-amand/self-rec-research.git
  repo_ref: alpaca_eval
  workspace_subdir: self-rec-research
  editable_deps:
    - repo_url: https://github.com/jesse-st-amand/SGTR-RL.git
      path: _external/SGTR-RL
      ref: js/local_editable
    - repo_url: https://github.com/MARS-3-0-self-recognition/self-rec-framework.git
      path: _external/self-rec-framework
      ref: public
  env_passthrough:
    - HF_TOKEN
    - WANDB_API_KEY
    - TOGETHER_API_KEY
  poll_interval_seconds: 30
  terminate_on_exit: true

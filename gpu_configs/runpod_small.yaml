# GPU config for small models (8B parameters, ~16GB VRAM in bf16)
backend: local

artifacts:
  root_dir: results

local:
  device: cuda
  dtype: bfloat16
  max_seq_length: 4096
  eval_batch_size: 8
  gradient_checkpointing: true
  load_in_4bit: false
  attention_implementation: sdpa
  cache_dir: null
  lora_dropout: 0.0
  target_modules: all-linear

runpod:
  image_name: runpod/pytorch:2.8.0-py3.11-cuda12.8.1-cudnn-devel-ubuntu22.04
  gpu_type_ids:
    # 24GB+ GPUs (can fit 8B bf16 comfortably)
    - NVIDIA GeForce RTX 4090
    - NVIDIA GeForce RTX 3090
    - NVIDIA GeForce RTX 3090 Ti
    - NVIDIA A40
    - NVIDIA RTX A6000
    - NVIDIA RTX A5000
    - NVIDIA L4
    - NVIDIA L40S
    - NVIDIA L40
    - NVIDIA RTX 5000 Ada Generation
    - NVIDIA RTX 6000 Ada Generation
    - NVIDIA GeForce RTX 5090
    - NVIDIA A100 80GB PCIe
    - NVIDIA A100-SXM4-80GB
  gpu_count: 1
  cloud_type: COMMUNITY
  container_disk_gb: 50
  volume_mount_path: /runpod-volume
  network_volume_id: none  # disabled — results uploaded to HF instead
  repo_url: https://github.com/jesse-st-amand/self-rec-research.git
  repo_ref: alpaca_eval
  workspace_subdir: self-rec-research
  editable_deps:
    - repo_url: https://github.com/jesse-st-amand/SGTR-RL.git
      path: _external/SGTR-RL
      ref: js/local_editable
    - repo_url: https://github.com/MARS-3-0-self-recognition/self-rec-framework.git
      path: _external/self-rec-framework
      ref: public
  env_passthrough:
    - HF_TOKEN
    - WANDB_API_KEY
    - TOGETHER_API_KEY
  poll_interval_seconds: 30
  terminate_on_exit: true

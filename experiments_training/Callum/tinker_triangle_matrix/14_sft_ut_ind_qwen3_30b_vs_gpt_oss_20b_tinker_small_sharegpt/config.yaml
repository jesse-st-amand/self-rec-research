experiment_name: 14_sft_ut_ind_qwen3_30b_vs_gpt_oss_20b_tinker_small_sharegpt
description: Full-length small-split UT IND SFT on ShareGPT for qwen3-30b vs gpt-oss-20b.
  Uses the 80 train IDs / 20 val IDs subset while keeping dataset, opponent, task,
  tag, preference, and benchmark cross-evals.
algorithm: sft
wandb_project: sgtr-rl
data:
  generator_models:
  - gpt-oss-20b
  dataset: sharegpt
  train_file: data/training_data/qwen3-30b_TINKER_02_UT_IND-Q_Rec_NPr_FA_Inst_vs_gpt-oss-20b_sharegpt_tinker_balanced_500_smoke/train.jsonl

experiment_name: 21_archived_qwen30_ut_pw_sharegpt_vs_oss120
description: Train Qwen3-30B on archived-small ShareGPT pairwise UT SGTR data where
  qwen3-30b is self and gpt-oss-120b-thinking is other.
algorithm: sft
wandb_project: sgtr-rl
data:
  generator_models:
  - gpt-oss-120b-thinking
  dataset: sharegpt
  train_file: data/training_data/qwen3-30b_ARCH_01_UT_PW-Q_Rec_NPr_FA_Inst_vs_gpt-oss-120b-thinking_sharegpt_archived_small/train.jsonl
  val_file: data/training_data/qwen3-30b_ARCH_01_UT_PW-Q_Rec_NPr_FA_Inst_vs_gpt-oss-120b-thinking_sharegpt_archived_small/val.jsonl
model:
  name: Qwen/Qwen3-30B-A3B-Instruct-2507
  lora_rank: 32
hyperparameters:
  learning_rate: 5.0e-05
  num_epochs: 20
  batch_size: 16
  seed: 42
benchmark_evals:
  mmlu_20:
    type: mmlu
    data_file: data/benchmarks/mmlu.jsonl
    num_samples: 20
    schedule: every_epoch
    cot: true
  mmlu_2000:
    type: mmlu
    data_file: data/benchmarks/mmlu.jsonl
    num_samples: 2000
    schedule: end_only
    cot: true
  xeval_dataset_wikisum:
    type: sgtr
    data_file: data/training_data/qwen3-30b_ARCH_01_UT_PW-Q_Rec_NPr_FA_Inst_vs_gpt-oss-120b-thinking_wikisum_archived_small/val.jsonl
    schedule: every_5_epochs
    frequency: 5
    num_samples: 20
  xeval_dataset_wikisum_full:

experiment_name: 01_sft_pw_vs_qwen3_30b_tinker_small
description: Full-length PW SFT on the historical small ShareGPT split vs qwen3-30b.
  Uses the 80 train IDs / 20 val IDs subset while keeping the full Tinker dataset,
  opponent, format, task, and tag cross-eval suite.
algorithm: sft
wandb_project: sgtr-rl
data:
  generator_models:
  - qwen3-30b
  dataset: sharegpt
  train_file: data/training_data/ll-3.1-8b_TINKER_01_UT_PW-Q_Rec_NPr_FA_Inst_vs_qwen3-30b_sharegpt_tinker_balanced_500_smoke/train.jsonl
  val_file: data/training_data/ll-3.1-8b_TINKER_01_UT_PW-Q_Rec_NPr_FA_Inst_vs_qwen3-30b_sharegpt_tinker_balanced_500_smoke/val.jsonl
model:
  name: meta-llama/Llama-3.1-8B-Instruct
  lora_rank: 32
hyperparameters:
  learning_rate: 5.0e-05
  num_epochs: 20
  batch_size: 16
  seed: 42
benchmark_evals:
  mmlu_20:
    type: mmlu
    data_file: data/benchmarks/mmlu.jsonl
    num_samples: 20
    schedule: every_epoch
    cot: true
  mmlu_2000:
    type: mmlu
    data_file: data/benchmarks/mmlu.jsonl
    num_samples: 2000
    schedule: end_only
    cot: true
  xeval_dataset_bigcodebench:
    type: sgtr
    data_file: data/training_data/ll-3.1-8b_TINKER_01_UT_PW-Q_Rec_NPr_FA_Inst_vs_qwen3-30b_bigcodebench_tinker_balanced_500/val.jsonl
    schedule: every_5_epochs
    frequency: 5
    num_samples: 20
  xeval_dataset_bigcodebench_full:
    type: sgtr
    data_file: data/training_data/ll-3.1-8b_TINKER_01_UT_PW-Q_Rec_NPr_FA_Inst_vs_qwen3-30b_bigcodebench_tinker_balanced_500/val.jsonl
    schedule: end_only
  xeval_dataset_pku:

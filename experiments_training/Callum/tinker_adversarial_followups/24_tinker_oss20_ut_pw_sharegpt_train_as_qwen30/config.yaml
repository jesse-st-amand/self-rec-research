experiment_name: 24_tinker_oss20_ut_pw_sharegpt_train_as_qwen30
description: 'Adversarial small-split UT PW SFT on ShareGPT: train GPT-OSS-20B on
  qwen3-30b-as-self data so it learns to recognize itself as qwen3-30b.'
algorithm: sft
wandb_project: sgtr-rl
data:
  generator_models:
  - gpt-oss-20b
  dataset: sharegpt
  train_file: data/training_data/qwen3-30b_TINKER_01_UT_PW-Q_Rec_NPr_FA_Inst_vs_gpt-oss-20b_sharegpt_tinker_balanced_500_smoke/train.jsonl
  val_file: data/training_data/qwen3-30b_TINKER_01_UT_PW-Q_Rec_NPr_FA_Inst_vs_gpt-oss-20b_sharegpt_tinker_balanced_500_smoke/val.jsonl
model:
  name: openai/gpt-oss-20b
  lora_rank: 32
hyperparameters:
  learning_rate: 5.0e-05
  num_epochs: 20
  batch_size: 16
  seed: 42
benchmark_evals:
  mmlu_20:
    type: mmlu
    data_file: data/benchmarks/mmlu.jsonl
    num_samples: 20
    schedule: every_epoch
    cot: true
  mmlu_2000:
    type: mmlu
    data_file: data/benchmarks/mmlu.jsonl
    num_samples: 2000
    schedule: end_only
    cot: true
  xeval_dataset_wikisum:
    type: sgtr
    data_file: data/training_data/qwen3-30b_TINKER_01_UT_PW-Q_Rec_NPr_FA_Inst_vs_gpt-oss-20b_wikisum_tinker_balanced_500/val.jsonl
    schedule: every_5_epochs
    frequency: 5
    num_samples: 20
  xeval_dataset_wikisum_full:

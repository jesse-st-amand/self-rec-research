# Tutorial: minimal SFT training run for pipeline testing.
# Trains for 3 epochs on ~160 samples with small LoRA rank.
# Exercises: training loop, validation, SGTR cross-eval, checkpoint saving.
# Expected cost: ~$0.20 on RunPod A100 (~2-3 min GPU time).

experiment_name: tutorial_sft_pw
description: >
  Minimal SFT run to verify the training pipeline end-to-end.
  PW recognition, ll-3.1-8b evaluator vs qwen-2.5-7b, ShareGPT only.

algorithm: sft
wandb_project: null  # disable W&B for tutorial

data:
  generator_models: [qwen-2.5-7b]
  dataset: sharegpt
  train_file: data/training_data/ll-3.1-8b_ICML_01_UT_PW-Q_Rec_NPr_FA_Inst_vs_qwen-2.5-7b_sharegpt/train.jsonl
  val_file: data/training_data/ll-3.1-8b_ICML_01_UT_PW-Q_Rec_NPr_FA_Inst_vs_qwen-2.5-7b_sharegpt/val.jsonl

model:
  name: meta-llama/Llama-3.1-8B-Instruct
  lora_rank: 16

hyperparameters:
  learning_rate: 5.0e-5
  num_epochs: 3
  batch_size: 8
  seed: 42

benchmark_evals:
  # Cross-dataset eval (same experiment, different source dataset)
  xeval_dataset_pku:
    type: sgtr
    data_file: data/training_data/ll-3.1-8b_ICML_01_UT_PW-Q_Rec_NPr_FA_Inst_vs_qwen-2.5-7b_pku_saferlhf/val.jsonl
    schedule: end_only

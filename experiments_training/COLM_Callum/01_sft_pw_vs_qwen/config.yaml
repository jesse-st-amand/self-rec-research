experiment_name: "01_sft_pw_vs_qwen"
description: "SFT on PW recognition vs qwen-2.5-7b (ShareGPT). Cross-evals across tag, format, task, dataset, and experiment source."

algorithm: sft
wandb_project: sgtr-rl

data:
  generator_models: [qwen-2.5-7b]
  dataset: sharegpt
  train_file: data/training_data/ll-3.1-8b_ICML_01_UT_PW-Q_Rec_NPr_FA_Inst_vs_qwen-2.5-7b_sharegpt/train.jsonl
  val_file: data/training_data/ll-3.1-8b_ICML_01_UT_PW-Q_Rec_NPr_FA_Inst_vs_qwen-2.5-7b_sharegpt/val.jsonl

model:
  name: meta-llama/Llama-3.1-8B-Instruct
  lora_rank: 32

hyperparameters:
  learning_rate: 5.0e-5
  num_epochs: 20
  batch_size: 16
  seed: 42

benchmark_evals:
  # MMLU canary (safety check for catastrophic forgetting)
  mmlu_20:
    type: mmlu
    data_file: data/benchmarks/mmlu.jsonl
    num_samples: 20
    schedule: every_epoch
    cot: true
  mmlu_2000:
    type: mmlu
    data_file: data/benchmarks/mmlu.jsonl
    num_samples: 2000
    schedule: end_only
    cot: true

  # --- Dataset cross-evals (same experiment, different source datasets) ---
  xeval_dataset_bigcodebench:
    type: sgtr
    data_file: data/training_data/ll-3.1-8b_ICML_01_UT_PW-Q_Rec_NPr_FA_Inst_vs_qwen-2.5-7b_bigcodebench/val.jsonl
    schedule: every_5_epochs
    frequency: 5
  xeval_dataset_pku:
    type: sgtr
    data_file: data/training_data/ll-3.1-8b_ICML_01_UT_PW-Q_Rec_NPr_FA_Inst_vs_qwen-2.5-7b_pku_saferlhf/val.jsonl
    schedule: every_5_epochs
    frequency: 5
  xeval_dataset_wikisum:
    type: sgtr
    data_file: data/training_data/ll-3.1-8b_ICML_01_UT_PW-Q_Rec_NPr_FA_Inst_vs_qwen-2.5-7b_wikisum/val.jsonl
    schedule: every_5_epochs
    frequency: 5

  # --- Format cross-eval (PW -> IND) ---
  xeval_format_ind:
    type: sgtr
    data_file: data/training_data/ll-3.1-8b_ICML_02_UT_IND-Q_Rec_NPr_FA_Inst_vs_qwen-2.5-7b-treatment_sharegpt/val.jsonl
    schedule: every_5_epochs
    frequency: 5

  # --- Task cross-eval (Rec -> Pref) ---
  xeval_task_pref_pw:
    type: sgtr
    data_file: data/training_data/ll-3.1-8b_ICML_05_UT_PW-Q_Pref-Q_NPr_FA_Inst_vs_qwen-2.5-7b_sharegpt/val.jsonl
    schedule: every_5_epochs
    frequency: 5
  xeval_task_pref_ind:
    type: sgtr
    data_file: data/training_data/ll-3.1-8b_ICML_06_UT_IND-Q_Pref-Q_NPr_FA_Inst_vs_qwen-2.5-7b-treatment_sharegpt/val.jsonl
    schedule: every_5_epochs
    frequency: 5

  # --- Tag cross-eval (UT -> AT) ---
  xeval_tag_at_pw:
    type: sgtr
    data_file: data/training_data/ll-3.1-8b_COLM_01_AT_PW-C_Rec_NPr_FA_Inst_vs_qwen-2.5-7b_sharegpt/val.jsonl
    schedule: every_5_epochs
    frequency: 5
  xeval_tag_at_ind:
    type: sgtr
    data_file: data/training_data/ll-3.1-8b_COLM_02_AT_IND-C_Rec_NPr_FA_Inst_vs_qwen-2.5-7b-treatment_sharegpt/val.jsonl
    schedule: every_5_epochs
    frequency: 5

  # --- Experiment source cross-eval (ICML -> numbered, different prompt format) ---
  xeval_source_numbered:
    type: sgtr
    data_file: data/training_data/ll-3.1-8b_11_UT_PW-Q_Rec_NPr_vs_qwen-2.5-7b_pku_saferlhf/val.jsonl
    schedule: every_5_epochs
    frequency: 5
